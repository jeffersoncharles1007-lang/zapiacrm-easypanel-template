name: ZAPIACRM Docker Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        run: |
          docker build -t jeffersoncharles1007-lang/zapiacrm-app:latest -t jeffersoncharles1007-lang/zapiacrm-app:v1.0 .
          docker push jeffersoncharles1007-lang/zapiacrm-app:latest
          docker push jeffersoncharles1007-lang/zapiacrm-app:v1.0